spring:
  application:
    name: folo-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/folo}
    username: ${DB_USERNAME:folo}
    password: ${DB_PASSWORD:folo}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    issuer: ${JWT_ISSUER:folo}
    access-token-expiration-seconds: ${JWT_ACCESS_EXPIRATION:900}
    refresh-token-expiration-seconds: ${JWT_REFRESH_EXPIRATION:1209600}
    secret: ${JWT_SECRET:please-change-me-please-change-me-please-change-me}
  email-verification:
    ttl-seconds: ${EMAIL_VERIFICATION_TTL:600}
    resend-cooldown-seconds: ${EMAIL_VERIFICATION_RESEND_COOLDOWN:60}
  field-encryption:
    secret: ${FIELD_ENCRYPTION_SECRET:please-change-this-field-encryption-secret}

integration:
  kis:
    stub-file: ${KIS_STUB_FILE:}
    oauth:
      enabled: ${KIS_OAUTH_ENABLED:false}
      base-url: ${KIS_BASE_URL:http://210.107.75.78:9443}
      app-key: ${KIS_APP_KEY:}
      app-secret: ${KIS_APP_SECRET:}
      redirect-uri: ${KIS_REDIRECT_URI:}
      corp-no: ${KIS_CORP_NO:}
      corp-name: ${KIS_CORP_NAME:Folo}
      contract-type: ${KIS_CONTRACT_TYPE:4}
  market-data:
    enabled: ${MARKET_DATA_SYNC_ENABLED:false}
    master-cron: ${MARKET_DATA_MASTER_CRON:0 0 4 * * *}
    zone: ${MARKET_DATA_SYNC_ZONE:Asia/Seoul}
    batch-size: ${MARKET_DATA_BATCH_SIZE:500}
    polygon:
      enabled: ${POLYGON_MASTER_ENABLED:false}
      api-key: ${POLYGON_API_KEY:}
      base-url: ${POLYGON_BASE_URL:https://api.polygon.io}
    kis:
      enabled: ${KIS_MASTER_ENABLED:false}
      master-file-url: ${KIS_MASTER_FILE_URL:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
