spring:
  application:
    name: folo-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/folo}
    username: ${DB_USERNAME:folo}
    password: ${DB_PASSWORD:folo}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  flyway:
    enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    issuer: ${JWT_ISSUER:folo}
    access-token-expiration-seconds: ${JWT_ACCESS_EXPIRATION:900}
    refresh-token-expiration-seconds: ${JWT_REFRESH_EXPIRATION:1209600}
    secret: ${JWT_SECRET:please-change-me-please-change-me-please-change-me}
  email-verification:
    ttl-seconds: ${EMAIL_VERIFICATION_TTL:600}
    resend-cooldown-seconds: ${EMAIL_VERIFICATION_RESEND_COOLDOWN:60}
  field-encryption:
    secret: ${FIELD_ENCRYPTION_SECRET:please-change-this-field-encryption-secret}

integration:
  kis:
    stub-file: ${KIS_STUB_FILE:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
