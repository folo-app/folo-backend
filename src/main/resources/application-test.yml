spring:
  datasource:
    url: jdbc:h2:mem:folo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

security:
  jwt:
    issuer: test-issuer
    access-token-expiration-seconds: 900
    refresh-token-expiration-seconds: 1209600
    secret: test-secret-test-secret-test-secret-test-secret
  email-verification:
    ttl-seconds: 600
    resend-cooldown-seconds: 60
  field-encryption:
    secret: test-field-encryption-secret

integration:
  kis:
    stub-file:
