services:
  postgres:
    image: postgres:16-alpine
    container_name: folo-postgres
    environment:
      POSTGRES_DB: folo
      POSTGRES_USER: folo
      POSTGRES_PASSWORD: folo
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: folo-redis
    ports:
      - "56379:6379"

volumes:
  postgres_data:
